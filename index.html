<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            font-size: 28px;
            color: #f1c40f;
            text-shadow: 2px 2px #d35400;
        }
        p {
            margin: 5px 0 15px 0;
            color: #bdc3c7;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background: #34495e;
            border: 4px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
        }
        .controls {
            margin-top: 15px;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>Super Segawon Adventure 🐕✨</h1>
    <p>Bantu Segawon melompat, hindari rintangan, dan kumpulkan Tulang Emas!</p>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="350"></canvas>
    </div>

    <div class="controls">
        <strong>Kontrol:</strong> Tekan <strong>Spasi</strong> atau <strong>Panah Atas (↑)</strong> untuk Melompat.<br>
        Gonggongan Segawon akan otomatis aktif saat melompati rintangan!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- LOAD GAMBAR ---
        const logoPlayer = new Image();
        logoPlayer.src = 'anjing.png'; 

        const logoObstacle = new Image();
        logoObstacle.src = 'pakmk.png'; 

        let imagesLoaded = 0;
        const totalImages = 2;
        
        function imageLoaded() {
            imagesLoaded++;
        }
        
        logoPlayer.onload = imageLoaded;
        logoObstacle.onload = imageLoaded;

        // --- GAME STATE ---
        let score = 0;
        let currentLevel = 1;
        let levelUpTimer = 0; 
        let gameOver = false;
        let gameStarted = false;
        let frames = 0;
        let gameSpeed = 4;

        // --- PLAYER OBJECT ---
        const segawon = {
            x: 50,
            y: 260,
            width: 50,  
            height: 50, 
            gravity: 0.6,
            lift: -12,
            velocity: 0,
            isJumping: false,
            groundY: 255, 
            draw: function() {
                if (imagesLoaded >= totalImages) {
                    ctx.drawImage(logoPlayer, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#d35400';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            },
            update: function() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                if (this.y >= this.groundY) {
                    this.y = this.groundY;
                    this.velocity = 0;
                    this.isJumping = false;
                }
            },
            jump: function() {
                if (!this.isJumping) {
                    this.velocity = this.lift;
                    this.isJumping = true;
                }
            }
        };

        let obstacles = [];
        let bones = [];

        // --- OBSTACLE CLASS ---
        class Obstacle {
            constructor() {
                this.x = canvas.width + 20;
                this.width = 40;
                this.height = 40;
                this.y = canvas.height - 50 - this.height;
                this.speed = gameSpeed;
            }
            draw() {
                if (imagesLoaded >= totalImages) {
                    ctx.drawImage(logoObstacle, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#f39c12'; 
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }
            update() {
                this.x -= this.speed;
            }
        }

        // --- BONE CLASS ---
        class Bone {
            constructor() {
                this.x = canvas.width + 50;
                this.y = 150 + Math.random() * 80;
                this.width = 25;
                this.height = 12;
                this.speed = gameSpeed;
            }
            draw() {
                ctx.fillStyle = '#f1c40f'; 
                ctx.fillRect(this.x + 4, this.y + 3, this.width - 8, this.height - 6);
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y + 3, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 4, this.y + 9, 4, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 4, this.y + 3, 4, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 4, this.y + 9, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x -= this.speed;
            }
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameStarted) {
                    gameStarted = true;
                } else if (gameOver) {
                    resetGame();
                } else {
                    segawon.jump();
                }
            }
        });

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (!gameStarted) {
                gameStarted = true;
            } else if (gameOver) {
                resetGame();
            } else {
                segawon.jump();
            }
        });

        function resetGame() {
            score = 0;
            currentLevel = 1;
            levelUpTimer = 0;
            gameOver = false;
            frames = 0;
            gameSpeed = 4;
            obstacles = [];
            bones = [];
            segawon.y = segawon.groundY;
            segawon.velocity = 0;
        }

        function spawnManager() {
            let spawnInterval = Math.max(60, 120 - (currentLevel * 10));
            if (frames % Math.floor(spawnInterval) === 0) {
                obstacles.push(new Obstacle());
            }
            if (frames % 170 === 0) {
                bones.push(new Bone());
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // --- GAME LOGIC UPDATE ---
        function update() {
            if (!gameStarted || gameOver) return;

            frames++;

            let calculatedLevel = Math.floor(score / 100) + 1;
            if (calculatedLevel > currentLevel) {
                currentLevel = calculatedLevel;
                gameSpeed += 0.8; 
                levelUpTimer = 90; 
            }

            if (levelUpTimer > 0) levelUpTimer--;

            segawon.update();
            spawnManager();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (checkCollision(segawon, obstacles[i])) {
                    gameOver = true;
                }
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 5; 
                }
            }

            for (let i = bones.length - 1; i >= 0; i--) {
                bones[i].update();
                if (checkCollision(segawon, bones[i])) {
                    score += 20; 
                    bones.splice(i, 1);
                    continue;
                }
                if (bones[i].x + bones[i].width < 0) {
                    bones.splice(i, 1);
                }
            }
        }

        // --- RENDER GRAPHICS ---
        function draw() {
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#5d6d7e';
            ctx.beginPath();
            ctx.arc(100, 80, 20, 0, Math.PI * 2);
            ctx.arc(130, 70, 25, 0, Math.PI * 2);
            ctx.arc(160, 80, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#219a52';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 5);

            segawon.draw();
            obstacles.forEach(obs => obs.draw());
            bones.forEach(bone => bone.draw());

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Skor: ${score}`, 20, 35);
            
            ctx.fillStyle = '#f1c40f';
            ctx.fillText(`Level: ${currentLevel}`, canvas.width - 100, 35);

            if (levelUpTimer > 0 && !gameOver) {
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`LEVEL UP! 🔥`, canvas.width / 2, 100);
            }

            if (!gameStarted) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Tekan SPASI / SENTUH Layar untuk Mulai', canvas.width / 2, canvas.height / 2);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 26px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER 💥🐾', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText(`Total Skor: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Tekan SPASI / SENTUH Layar untuk Mengulang', canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        // --- MAIN LOOP ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
