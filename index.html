<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Segawon Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        
        /* Kontainer Utama Logo di Atas Game */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .brand-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 5px 0;
            font-size: 28px;
            color: #f1c40f;
            text-shadow: 2px 2px #d35400;
            text-align: center;
        }
        p {
            margin: 5px 0 15px 0;
            color: #bdc3c7;
            text-align: center;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background: #34495e;
            border: 4px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: block;
        }
        .controls {
            margin-top: 15px;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <img class="brand-logo" src="logosmk.jpeg" alt="Logo SMKN 1 Sanden">
        <img class="brand-logo" src="pakmk.jpeg" alt="Logo MOKO">
    </div>

    <h1>Super Segawon Adventure 🐕✨</h1>
    <p>Bantu Segawon melompat, hindari Kucing Oyen, dan kumpulkan Tulang Emas!</p>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="350"></canvas>
    </div>

    <div class="controls">
        <strong>Kontrol:</strong> Tekan <strong>Spasi</strong> atau <strong>Panah Atas (↑)</strong> untuk Melompat.<br>
        Gonggongan Segawon akan otomatis aktif saat melompati rintangan!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        let score = 0;
        let currentLevel = 1;
        let levelUpTimer = 0; 
        let gameOver = false;
        let gameStarted = false;
        let frames = 0;
        let gameSpeed = 4;

        // Player (Segawon)
        const segawon = {
            x: 50,
            y: 270,
            width: 40,
            height: 30,
            gravity: 0.6,
            lift: -12,
            velocity: 0,
            isJumping: false,
            groundY: 270,
            draw: function() {
                // Badan Segawon (Anjing Cokelat)
                ctx.fillStyle = '#d35400';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Kepala
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(this.x + 25, this.y - 10, 20, 20);
                
                // Telinga
                ctx.fillStyle = '#ba4a00';
                ctx.fillRect(this.x + 25, this.y - 15, 8, 10);
                
                // Mata
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x + 40, this.y - 6, 4, 4);

                // Kaki (efek lari sederhana)
                ctx.fillStyle = '#ba4a00';
                let legOffset = (Math.floor(frames / 5) % 2 === 0 && !this.isJumping) ? 5 : 0;
                ctx.fillRect(this.x + 5, this.y + this.height, 6, 8 - legOffset);
                ctx.fillRect(this.x + 25, this.y + this.height, 6, 8 - legOffset);
            },
            update: function() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                if (this.y >= this.groundY) {
                    this.y = this.groundY;
                    this.velocity = 0;
                    this.isJumping = false;
                }
            },
            jump: function() {
                if (!this.isJumping) {
                    this.velocity = this.lift;
                    this.isJumping = true;
                }
            }
        };

        // Rintangan (Kucing Oyen) & Item (Tulang Emas)
        let obstacles = [];
        let bones = [];

        class Obstacle {
            constructor() {
                this.x = canvas.width + 20;
                this.width = 30;
                this.height = 35;
                this.y = canvas.height - 50 - this.height;
                this.speed = gameSpeed;
            }
            draw() {
                // Kucing Oyen
                ctx.fillStyle = '#f39c12'; 
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Telinga Kucing
                ctx.fillStyle = '#d35400';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 8, this.y - 8);
                ctx.lineTo(this.x + 12, this.y);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(this.x + this.width, this.y);
                ctx.lineTo(this.x + this.width - 8, this.y - 8);
                ctx.lineTo(this.x + this.width - 12, this.y);
                ctx.fill();
                // Mata
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 5, this.y + 8, 5, 5);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 7, this.y + 10, 2, 2);
            }
            update() {
                this.x -= this.speed;
            }
        }

        class Bone {
            constructor() {
                this.x = canvas.width + 50;
                this.y = 150 + Math.random() * 80;
                this.width = 25;
                this.height = 12;
                this.speed = gameSpeed;
            }
            draw() {
                ctx.fillStyle = '#f1c40f'; 
                // Batang tulang
                ctx.fillRect(this.x + 4, this.y + 3, this.width - 8, this.height - 6);
                // Ujung bundar tulang
                ctx.beginPath();
                ctx.arc(this.x + 4, this.y + 3, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 4, this.y + 9, 4, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 4, this.y + 3, 4, 0, Math.PI * 2);
                ctx.arc(this.x + this.width - 4, this.y + 9, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x -= this.speed;
            }
        }

        // Input Handler
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameStarted) {
                    gameStarted = true;
                } else if (gameOver) {
                    resetGame();
                } else {
                    segawon.jump();
                }
            }
        });

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (!gameStarted) {
                gameStarted = true;
            } else if (gameOver) {
                resetGame();
            } else {
                segawon.jump();
            }
        });

        function resetGame() {
            score = 0;
            currentLevel = 1;
            levelUpTimer = 0;
            gameOver = false;
            frames = 0;
            gameSpeed = 4;
            obstacles = [];
            bones = [];
            segawon.y = segawon.groundY;
            segawon.velocity = 0;
        }

        function spawnManager() {
            let spawnInterval = Math.max(60, 120 - (currentLevel * 10));
            
            if (frames % Math.floor(spawnInterval) === 0) {
                obstacles.push(new Obstacle());
            }
            if (frames % 170 === 0) {
                bones.push(new Bone());
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (!gameStarted || gameOver) return;

            frames++;

            let calculatedLevel = Math.floor(score / 100) + 1;
            if (calculatedLevel > currentLevel) {
                currentLevel = calculatedLevel;
                gameSpeed += 0.8; 
                levelUpTimer = 90; 
            }

            if (levelUpTimer > 0) levelUpTimer--;

            segawon.update();
            spawnManager();

            // Rintangan Loop
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                
                if (checkCollision(segawon, obstacles[i])) {
                    gameOver = true;
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 5; 
                }
            }

            // Tulang Emas Loop
            for (let i = bones.length - 1; i >= 0; i--) {
                bones[i].update();

                if (checkCollision(segawon, bones[i])) {
                    score += 20; 
                    bones.splice(i, 1);
                    continue;
                }

                if (bones[i].x + bones[i].width < 0) {
                    bones.splice(i, 1);
                }
            }
        }

        function draw() {
            // Background Langit
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Awan Dekorasi
            ctx.fillStyle = '#5d6d7e';
            ctx.beginPath();
            ctx.arc(100, 80, 20, 0, Math.PI * 2);
            ctx.arc(130, 70, 25, 0, Math.PI * 2);
            ctx.arc(160, 80, 20, 0, Math.PI * 2);
            ctx.fill();

            // Tanah
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#219a52';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 5);

            // Objek Game
            segawon.draw();
            obstacles.forEach(obs => obs.draw());
            bones.forEach(bone => bone.draw());

            // Teks Skor & Level
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Skor: ${score}`, 20, 35);
            
            ctx.fillStyle = '#f1c40f';
            ctx.fillText(`Level: ${currentLevel}`, canvas.width - 100, 35);

            // Animasi / Teks Pemberitahuan Level Up
            if (levelUpTimer > 0 && !gameOver) {
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`LEVEL UP! 🔥`, canvas.width / 2, 100);
            }

            // Halaman Menu Mulai
            if (!gameStarted) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('SUPER SEGAWON ADVENTURE', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText('Tekan SPASI / SENTUH Layar untuk Memulai', canvas.width / 2, canvas.height / 2 + 20);
            }

            // Halaman Game Over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('SEGAWON TABRAKAN! 💥🐾', canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Arial';
                ctx.fillText(`Level Terakhir: ${currentLevel}`, canvas.width / 2, canvas.height / 2);
                ctx.fillText(`Total Skor Kamu: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
                ctx.fillText('Tekan SPASI / SENTUH Layar untuk Main Lagi', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
